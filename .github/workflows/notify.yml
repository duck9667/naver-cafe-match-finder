name: Cafe match notifier

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Search cafe and notify Slack
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_RECIPIENTS: ${{ secrets.SLACK_RECIPIENTS }}
          TARGET_CAFE: ${{ vars.TARGET_CAFE }}
          SEARCH_QUERIES: ${{ vars.SEARCH_QUERIES }}
          EXCLUDE_KEYWORDS: ${{ vars.EXCLUDE_KEYWORDS }}
        run: python3 run.py

      - name: Persist seen_links.json so future runs don't re-notify
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_links.json
          git diff --cached --quiet || git commit -m "Update seen_links.json [skip ci]"
          git push
